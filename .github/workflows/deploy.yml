name: Deploy Backend to NAS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: SSH into NAS and deploy backend
        run: |
          ssh -o StrictHostKeyChecking=no deployer@192.168.1.4 \
            "cd /volume1/docker/uxrev-backend && git fetch origin main && git reset --hard origin/main"